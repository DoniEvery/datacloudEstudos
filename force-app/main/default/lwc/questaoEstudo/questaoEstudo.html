<template>
    <div class="questao-container">
        <!-- Seletor de Certificação -->
        <div class="selector-section">
            <label>Selecione a Certificação:</label>
            <select onchange={handleCertificacaoChange} disabled={isLoading}>
                <option value="">-- Escolha uma certificação --</option>
                <template for:each={certificacoes} for:item="certificacao">
                    <option key={certificacao.id} value={certificacao.id}>
                        {certificacao.name}
                    </option>
                </template>
            </select>
        </div>

        <!-- Seletor de Tópico (pai) -->
        <div class="selector-section">
            <label>Selecione o Tópico:</label>
            <select onchange={handleTopicoChange} disabled={isLoading}>
                <option value="">-- Escolha um tópico --</option>
                <template for:each={topicos} for:item="topico">
                    <option key={topico.id} value={topico.id}>
                        {topico.name}
                    </option>
                </template>
            </select>
        </div>

        <!-- Exibição dos Subtópicos -->
        <template if:true={temSubtopicos}>
            <div class="subtopicos-section">
                <div class="subtopicos-label">Subtópicos a estudar:</div>
                <div class="subtopicos-container">
                    <template for:each={subtopicos} for:item="subtopico">
                        <span key={subtopico.id} class="subtopico-pill">
                            {subtopico.name}
                        </span>
                    </template>
                </div>
            </div>
        </template>

        <!-- Exibição da Questão -->
        <template if:true={questaoAtual}>
            <div class="questao-box">
                <div class="questao-header">
                    <h2>{questaoAtual.enunciado}</h2>
                    <span class="nivel-badge" data-nivel={questaoAtual.nivel}>
                        {questaoAtual.nivel}
                    </span>
                </div>

                <div class="alternativas-container">
                    <template for:each={alternativasRenderizadas} for:item="alt">
                        <button 
                            key={alt.id} 
                            class={alt.classe}
                            onclick={handleAlternativaClick}
                            data-id={alt.id}
                            data-correta={alt.correta}
                            data-ordem={alt.ordem}
                            disabled={mostrarResultado}>
                            <span class="letra">{alt.letra}</span>
                            <span class="texto">{alt.texto}</span>
                            <template if:true={mostrarResultado}>
                                <span class="icone">
                                    <template if:true={alt.correta}>✓</template>
                                    <template if:false={alt.correta}>✗</template>
                                </span>
                            </template>
                        </button>
                    </template>
                </div>

                <template if:true={mostrarResultado}>
                    <div class={getResultadoClass}>
                        <p class="resultado-titulo">{mensagemResultado}</p>

                        <template if:true={mostrarRespostaCorreta}>
                            <div class="explicacao explicacao--correta-label">
                                <span class="explicacao-icone">✓</span>
                                <span><strong>Resposta correta:</strong> {respostaCorreta}</span>
                            </div>
                        </template>

                        <template if:true={mostrarExplicacaoSelecionada}>
                            <div class="explicacao explicacao--motivo">
                                <span class="explicacao-icone">💡</span>
                                <div>
                                    <strong class="explicacao-label">{tituloExplicacaoSelecionada}</strong>
                                    <p class="explicacao-texto">{explicacaoSelecionada}</p>
                                </div>
                            </div>
                        </template>

                        <template if:true={mostrarExplicacaoCorreta}>
                            <div class="explicacao explicacao--correta-motivo">
                                <span class="explicacao-icone">📖</span>
                                <div>
                                    <strong class="explicacao-label">Por que a correta está certa:</strong>
                                    <p class="explicacao-texto">{explicacaoCorreta}</p>
                                </div>
                            </div>
                        </template>
                    </div>

                    <template if:true={proximaRevisaoLabel}>
                        <div class="proxima-revisao">
                            <span class="proxima-revisao-icone">🗓</span> {proximaRevisaoLabel}
                        </div>
                    </template>

                    <button 
                        class="btn-proximo" 
                        onclick={handleProxima}>
                        Próxima Questão →
                    </button>
                </template>
            </div>

            <div class="progresso">
                {progressoTexto}
            </div>
        </template>

        <!-- Mensagem quando nenhum tópico selecionado -->
        <template if:false={questaoAtual}>
            <div class="mensagem-info">
                Selecione um tópico para começar a estudar.
            </div>
        </template>

        <!-- Loading -->
        <template if:true={isLoading}>
            <div class="loading">Carregando...</div>
        </template>
    </div>
</template>
