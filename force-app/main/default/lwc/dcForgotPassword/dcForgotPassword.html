<template>
    <div class="container">
        <div class="card">
            <h2>Recuperar senha</h2>
            <p>Informe seu e-mail para receber o link de redefinição.</p>

            <template if:true={error}><div class="error">{error}</div></template>
            <template if:true={success}><div class="success">{success}</div></template>

            <input type="email" placeholder="Digite seu e-mail" oninput={handleInputChange} />

            <button class="btn-primary" onclick={handleSubmit} disabled={isLoading}>Enviar</button>
            <button class="btn-link" onclick={goBack}>Voltar ao login</button>
        </div>
    </div>
</template>
